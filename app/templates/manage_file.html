{% extends "template.html" %}

{% block content %}
<div class="flex justify-center items-center h-screen">
    <div class="bg-white/50 backdrop-blur-xs rounded-lg shadow-lg p-8 min-w-107.5 max-w-[75%] max-h-screen overflow-y-auto m-8">
        <h1 class="font-bold text-2xl underline"><u>{{ filename }}</u></h1>
        <p><strong>Mime Type:</strong> {{ mime }}</p>
        <p><strong>Size:</strong> {{ size }} bytes</p>
        <p><strong>Upload Date:</strong> {{ date }}</p>
        <br>
        <a href="/manage/delete" class="text-white hover:text-gray-100 bg-red-500 hover:bg-red-600 rounded-lg p-2">
            Delete File
        </a>
    </div>
</div>
{% endblock %}
